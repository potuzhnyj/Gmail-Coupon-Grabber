<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#F0B800"/>
    </linearGradient>
  </defs>

  <!-- Black rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="#1A1A1A"/>

  <!-- Envelope body -->
  <rect x="96" y="170" width="320" height="210" rx="14" ry="14" fill="none" stroke="#fff" stroke-width="10"/>

  <!-- Envelope flap -->
  <path d="M96 180 L256 300 L416 180" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Coupon tag -->
  <g transform="translate(300, 95) rotate(12)">
    <rect x="0" y="0" width="140" height="72" rx="10" ry="10" fill="url(#gold)"/>
    <!-- Dashed cut line -->
    <line x1="34" y1="0" x2="34" y2="72" stroke="#1A1A1A" stroke-width="2.5" stroke-dasharray="6,4"/>
    <!-- Punch hole -->
    <circle cx="17" cy="36" r="8" fill="#1A1A1A"/>
    <!-- Percent symbol -->
    <text x="88" y="50" font-family="Arial, sans-serif" font-weight="bold" font-size="40" fill="#1A1A1A" text-anchor="middle">%</text>
  </g>

  <!-- Scissors -->
  <g transform="translate(288, 160) rotate(12) scale(0.55)">
    <circle cx="10" cy="10" r="10" fill="none" stroke="#FFD700" stroke-width="4"/>
    <circle cx="10" cy="50" r="10" fill="none" stroke="#FFD700" stroke-width="4"/>
    <line x1="18" y1="14" x2="52" y2="30" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
    <line x1="18" y1="46" x2="52" y2="30" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
